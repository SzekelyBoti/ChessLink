<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
<h1>ChessLink WS Test</h1>
<input id="msg" placeholder="Enter move" />
<button onclick="sendMessage()">Send</button>

<script>
    const gameId = "a3fd06e8-5542-4fff-b653-f8842267e672";
    const ws = new WebSocket(`ws://127.0.0.1:8000/ws/${gameId}`);

    ws.onopen = () => console.log("Connected to game:", gameId);
    ws.onmessage = (e) => console.log("Received:", e.data);
    ws.onclose = () => console.log("Disconnected");

    function sendMessage() {
        const msg = document.getElementById("msg").value;
        ws.send(msg);
    }
</script>
</body>
</html>
